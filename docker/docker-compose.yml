version: "3.9"

services:

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
    stdin_open: true
    tty: true

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A config worker -l info
    volumes:
      - ../backend:/app
    depends_on:
      - redis
      - backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0